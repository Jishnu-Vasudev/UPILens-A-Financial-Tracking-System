name: upilens
description: "UPI Lens — Privacy-first UPI transaction tracker with on-device AI insights."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Database
  sqflite: ^2.3.3
  path: ^1.9.0

  # Permissions
  permission_handler: ^11.3.1

  # Storage
  shared_preferences: ^2.2.3


  # Path utilities
  path_provider: ^2.1.3

  # Charts
  fl_chart: ^0.68.0

  # Loading shimmer
  shimmer: ^3.0.0

  # Date formatting
  intl: ^0.19.0

  # UI
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1

  # Firebase & Auth
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  google_sign_in: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/classifier_data.json
